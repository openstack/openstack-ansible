- name: Get pki_hashi_vault_password directly from file
  ansible.builtin.set_fact:
    _pki_hashi_vault_password: "{{ lookup('ansible.builtin.file', '/etc/openstack_deploy/user_secrets.yml') | from_yaml | json_query('pki_hashi_vault_password') }}"
  when: pki_hashi_vault_password is not defined or pki_hashi_vault_password is none

- name: Install dependencies
  ansible.builtin.apt:
    name:
      - unzip
      - wget
    state: present
  become: true

# NOTE(damiandabrowski): OSA inventory is not available at this point.
- name: Load required variables from YAML file
  include_vars:
    file: "{{ lookup('env', 'OSA_CLONE_DIR') }}/inventory/group_vars/all/source_git.yml"
    name: source_git

- name: Ensure hvac>=2.0 is installed
  vars:
    openbao_upper_constraints: "{{ 'https://releases.openstack.org/constraints/upper/' ~ source_git.requirements_git_install_branch }}"
  ansible.builtin.pip:
    name: hvac
    version: ">=2.0"
    extra_args: "--constraint {{ openbao_upper_constraints }}"

- name: Extract OpenBao binary
  ansible.builtin.unarchive:
    include: bao
    src: "{{ openbao_url }}"
    dest: "{{ openbao_install_dir }}"
    mode: "0755"
    remote_src: true

- name: Configure openbao systemd service
  ansible.builtin.import_role:
    name: systemd_service
  vars:
    systemd_services:
      - service_name: openbao
        execstarts: "bao server -dev -dev-root-token-id={{ openbao_root_token }} -dev-listen-address={{ openbao_listen_address }}"

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Wait for OpenBao to become available
  ansible.builtin.wait_for:
    port: "{{ openbao_listen_port }}"
    host: "{{ openbao_ip }}"
    delay: 5
    timeout: 20

- name: Set environment variables in /etc/environment
  ansible.builtin.lineinfile:
    path: "/etc/environment"
    line: "{{ item }}"
    create: true
  loop:
    - 'BAO_ADDR="{{ openbao_address }}"'
    - 'BAO_TOKEN="{{ openbao_root_token }}"'
  no_log: true

- name: Configure OpenBao (policies, auth, PKI, roles)
  community.hashi_vault.vault_write:
    path: "{{ item.path }}"
    url: "{{ openbao_address }}"
    token: "{{ openbao_root_token }}"
    data: "{{ item.data }}"
  loop_control:
    label: "{{ {'name': item.name, 'path': item.path} }}"
  loop:
    - name: Create pki policy
      path: sys/policies/acl/pki
      data:
        policy: |
          path "pki_root/*" {
            capabilities = ["create", "read", "update", "delete", "list", "sudo"]
          }
          path "pki_int/*" {
            capabilities = ["create", "read", "update", "delete", "list", "sudo"]
          }

    - name: Enable userpass authentication method
      path: sys/auth/userpass
      data:
        type: userpass

    - name: Create OpenBao user
      path: "auth/userpass/users/{{ pki_hashi_vault_login | default('osa') }}"
      data:
        password: "{{ _pki_hashi_vault_password | default(pki_hashi_vault_password) }}"
        policies: "pki"

    - name: Enable PKI secret engine at pki_root/
      path: sys/mounts/pki_root
      data:
        type: pki
        config:
          max_lease_ttl: 3650d

    - name: Enable PKI secret engine at pki_int/
      path: sys/mounts/pki_int
      data:
        type: pki
        config:
          max_lease_ttl: 3650d

    - name: Create role in pki_int/
      path: "pki_int/roles/{{ openbao_role_name }}"
      data:
        allow_any_name: true
        ttl: 90d

