component_skel:
  octavia_api:
    belongs_to:
      - octavia_all
  octavia_worker:
    belongs_to:
      - octavia_all
  octavia_housekeeping:
    belongs_to:
      - octavia_all
  octavia_health_manager:
    belongs_to:
      - octavia_all


container_skel:
  octavia_server_container:
    belongs_to:
      - octavia_infra_containers
    contains:
      - octavia_api
      - octavia_worker
      - octavia_housekeeping
      - octavia_health_manager

physical_skel:
  octavia_infra_containers:
    belongs_to:
      - all_containers
  octavia_infra_hosts:
    belongs_to:
      - hosts
